<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg5)"/>
  <!-- Star trail arcs -->
  <circle cx="600" cy="-200" r="600" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <circle cx="600" cy="-200" r="650" fill="none" stroke="white" stroke-width="0.5" opacity="0.25"/>
  <circle cx="600" cy="-200" r="700" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <circle cx="600" cy="-200" r="750" fill="none" stroke="white" stroke-width="0.5" opacity="0.35"/>
  <circle cx="600" cy="-200" r="800" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <circle cx="600" cy="-200" r="850" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <circle cx="600" cy="-200" r="900" fill="none" stroke="white" stroke-width="0.5" opacity="0.15"/>
  <circle cx="600" cy="-200" r="950" fill="none" stroke="white" stroke-width="0.5" opacity="0.25"/>
  <!-- Mountain silhouette -->
  <polygon points="0,800 200,600 400,650 600,550 800,620 1000,580 1200,650 1200,800" fill="#0f172a"/>
  <text x="600" y="750" text-anchor="middle" fill="white" opacity="0.4" font-family="sans-serif" font-size="24">Star Trails</text>
</svg>
