<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>6/23 月相全天</title>
<style>
body{background:#1a1a1a;color:#eee;font-family:system-ui,sans-serif;padding:16px}
h2{margin:0 0 4px}.note{color:#9ca3af;font-size:12px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
.cell{text-align:center;background:#1e1e1e;border-radius:8px;padding:8px 4px}
.cell svg{display:block;margin:0 auto 2px}
.time{font-weight:600;font-size:12px}.info{font-size:9px;color:#9ca3af}
.rate{font-size:8px;color:#6b7280}
.vis{font-size:8px;color:#60a5fa}.hid{font-size:8px;color:#f59e0b}
</style></head><body>
<h2>2026-06-23 北京 · 30秒精度（2880点搜索极值）</h2>
<p class="note">cs=0 无镜像 | 极值 min=-117.99°@1.39h max=-17.05°@12.26h | range=100.94° sf=1.2286</p>
<div class="grid" id="g"></div>
<script>
function P(f,w,r){r=r||10;var x=Math.max(Math.abs(r*(1-2*f)),0.001);var c=w?0:1;var t=w?(f<0.5?1:0):(f<0.5?0:1);return"M 12 "+(12-r)+" A "+r+" "+r+" 0 0 "+c+" 12 "+(12+r)+" A "+x+" "+r+" 0 0 "+t+" 12 "+(12-r)+" Z"}
var D=[{h:0,f:0.5778,rot:-120.06,alt:3},{h:1,f:0.5820,rot:-118.16,alt:-8},{h:2,f:0.5861,rot:-118.41,alt:-19},{h:3,f:0.5903,rot:-121.17,alt:-30},{h:4,f:0.5944,rot:-127.34,alt:-41},{h:5,f:0.5985,rot:-138.60,alt:-50},{h:6,f:0.6026,rot:-157.01,alt:-56},{h:7,f:0.6067,rot:-181.97,alt:-59},{h:8,f:0.6107,rot:-206.48,alt:-56},{h:9,f:0.6148,rot:-224.03,alt:-49},{h:10,f:0.6188,rot:-234.48,alt:-40},{h:11,f:0.6229,rot:-239.91,alt:-30},{h:12,f:0.6269,rot:-241.93,alt:-19},{h:13,f:0.6309,rot:-241.36,alt:-8},{h:14,f:0.6349,rot:-238.51,alt:3},{h:15,f:0.6389,rot:-233.32,alt:13},{h:16,f:0.6429,rot:-225.45,alt:22},{h:17,f:0.6468,rot:-214.45,alt:30},{h:18,f:0.6508,rot:-200.10,alt:35},{h:19,f:0.6547,rot:-183.14,alt:38},{h:20,f:0.6586,rot:-165.61,alt:37},{h:21,f:0.6625,rot:-149.87,alt:33},{h:22,f:0.6664,rot:-137.21,alt:26},{h:23,f:0.6702,rot:-127.72,alt:17}];
var o=document.getElementById('g'),prev=null;
D.forEach(function(d,i){
  var p=P(d.f,true),hh=String(d.h).padStart(2,'0');
  var rate='';
  if(i>0){var dr=(d.rot-D[i-1].rot).toFixed(1);rate='<div class="rate">'+dr+'°/h</div>';}
  o.innerHTML+='<div class="cell">'
    +'<svg viewBox="0 0 24 24" width="68" height="68"><circle cx="12" cy="12" r="10" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/><g transform="translate(12,12) rotate('+d.rot.toFixed(1)+') translate(-12,-12)"><path d="'+p+'" fill="rgba(255,255,255,0.95)"/></g></svg>'
    +'<div class="time">'+hh+':00</div>'
    +'<div class="info">rot '+d.rot.toFixed(0)+'° · '+Math.round(d.f*100)+'%</div>'
    +rate
    +'<div class="'+(d.alt>0?'vis':'hid')+'">'+(d.alt>0?'🌙可见':'⬇地平线下')+'</div></div>';
});
</script></body></html>
